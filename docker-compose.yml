services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - OLLAMA_MODEL=gemma2:9b
      - EMBEDDING_MODEL=nomic-embed-text
      - CHROMA_DB_PATH=/app/data/vectorstore
      - UPLOAD_PATH=/app/data/uploads
      - OLLAMA_HOST=http://ollama:11434
      - ANONYMIZED_TELEMETRY=False
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data: